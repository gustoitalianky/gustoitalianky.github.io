<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gusto Italian - Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .wrapper {
            max-width: 500px;
            padding: 20px;
        }
        .logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 25px;
            border-radius: 50%;
        }
        p {
            font-size: 1.3rem;
            color: #cccccc;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover {
            background-color: #e5e5e5;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="logo.jpg" alt="Gusto Italian Logo" class="logo">
        <p>Application form. Click here.</p>
        <a href="https://gustoitalianky.github.io/application/" class="btn">Apply Now</a>
    </div>
</body>
</html>
