<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gusto Italian - Portal</title>
    <style>
        /* Modern Reset & Premium Smooth Background */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle, #161616 0%, #090909 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .wrapper {
            max-width: 500px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Smooth Floating Animation for the Logo */
        .logo {
            max-width: 210px;
            height: auto;
            margin-bottom: 35px;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: floatAnimation 4s ease-in-out infinite;
        }

        @keyframes floatAnimation {
            0% {
                transform: translateY(0px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }
            50% {
                transform: translateY(-10px);
                box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            }
            100% {
                transform: translateY(0px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }
        }

        /* Elegant Luxury Text */
        p {
            font-size: 1.15rem;
            color: #dcdcdc;
            margin-bottom: 35px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.9;
        }

        /* High-End Interactive Button with Soft Ambient Glow */
        .btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 16px 45px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px; /* Rounded pill shape for a more modern look */
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        /* Hover & Active Feedback States */
        .btn:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 255, 255, 0.25);
            letter-spacing: 3px; /* Subtle widening effect on hover */
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="logo.jpg" alt="Gusto Italian Logo" class="logo">
        
        <p>Application Form • Click Below</p>
        
        <a href="https://gustoitalianky.github.io/application/" class="btn">Apply Now</a>
    </div>

</body>
</html>
