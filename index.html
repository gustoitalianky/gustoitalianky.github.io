<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gusto Italian - Portal</title>
    <style>
        /* Force the absolute root of the page to be pure dark */
        html {
            background-color: #090909;
            height: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #161616 0%, #090909 100%) no-repeat fixed;
            background-color: #090909;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available; /* Fixes iOS Safari height bugs */
            text-align: center;
            overflow-x: hidden;
        }

        .wrapper {
            width: 100%;
            max-width: 450px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Smooth Floating Animation for the Logo */
        .logo {
            max-width: 190px;
            height: auto;
            margin-bottom: 25px;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: floatAnimation 4s ease-in-out infinite;
        }

        @keyframes floatAnimation {
            0% {
                transform: translateY(0px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }
            50% {
                transform: translateY(-10px);
                box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            }
            100% {
                transform: translateY(0px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }
        }

        h2 {
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 10px 0;
            color: #ffffff;
        }

        p {
            font-size: 0.95rem;
            color: #aaa;
            margin: 0 0 35px 0;
            letter-spacing: 1px;
            font-weight: 400;
        }

        /* Flexbox Stack for the Dual Link Navigation Cluster */
        .button-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Universal Luxury Button Base Style */
        .btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            box-sizing: border-box;
        }

        /* Option 1: Premium High-Contrast Call to Action Button styling */
        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.08);
        }

        .btn-primary:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 255, 255, 0.2);
            letter-spacing: 3px;
        }

        /* Option 2: Elegant Minimalist Secondary Border Accent layout style */
        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.35);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.07);
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.05);
            letter-spacing: 3px;
        }

        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="logo.jpg" alt="Gusto Italian Logo" class="logo">
        
        <h2>Gusto Italian</h2>
        <p>Employment & New-Hire Portal</p>
        
        <div class="button-stack">
            <a href="https://gustoitalianky.github.io/job-application/" class="btn btn-primary">Join Our Team</a>
            
            <a href="https://gustoitalianky.github.io/application/" class="btn btn-secondary">New-Hire Onboarding</a>
        </div>
    </div>

</body>
</html>
